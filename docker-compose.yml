version: '3.8'

services:
  # ============================================
  # Backend API (Express.js)
  # ============================================
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: si-desa-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - UPLOAD_DIR=/app/uploads
    volumes:
      - uploads:/app/uploads

volumes:
  uploads:
    driver: local
