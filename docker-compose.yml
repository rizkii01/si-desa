version: '3.8'

services:
  # ============================================
  # Backend API (Express.js)
  # ============================================
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: si-desa-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - UPLOAD_DIR=/app/uploads
    volumes:
      - uploads:/app/uploads
    networks:
      - si-desa-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ============================================
  # Nginx (Reverse Proxy + SSL)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: si-desa-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt:ro
      - uploads:/var/www/uploads:ro
    depends_on:
      server:
        condition: service_healthy
    networks:
      - si-desa-network

  # ============================================
  # Certbot (SSL Let's Encrypt)
  # ============================================
  certbot:
    image: certbot/certbot
    container_name: si-desa-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - nginx
    # Auto-renew SSL setiap 12 jam
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  uploads:
    driver: local
  certbot-etc:
  certbot-var:

networks:
  si-desa-network:
    driver: bridge
