# ============================================
# HTTP Server (redirect ke HTTPS)
# ============================================
server {
    listen 80;
    server_name api.yourdomain.my.id;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    # Redirect ke HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================
# HTTPS Server
# ============================================
server {
    listen 443 ssl http2;
    server_name api.yourdomain.my.id;

    # SSL Certificate (akan diisi oleh Certbot)
    ssl_certificate /etc/letsencrypt/live/api.yourdomain.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.my.id/privkey.pem;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers EECDH+AESGCM:EDH+AESGCM;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # API Routes
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Login route - stricter rate limiting
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;

        proxy_pass http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static uploads
    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";

        # CORS untuk frontend
        add_header Access-Control-Allow-Origin "https://si-desa-roan.vercel.app" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    }

    # Health check
    location /health {
        proxy_pass http://server:5000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Default - return 404
    location / {
        return 404 '{"message":"Not found"}';
        add_header Content-Type application/json;
    }
}
